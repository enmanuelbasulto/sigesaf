            <script id="pg-usuarios" type="text/html">
                <div class="row">
                    <div class="col-md-12">
                        <div class="card">
                            <div class="header">
                                <button class="btn btn-default pull-right" data-bind="click: u.agregar">Agregar</button>
                                <h4 class="title"><i class="ti-user"></i>&nbsp;Usuarios</h4>
                                <p class="category">Lista de usuarios registrados bajo su dominio.</p>
                            </div>
                            <div class="content table-responsive table-full-width">
                                <table class="table table-striped">
                                    <thead>
                                        <th>ID</th>
                                    	<th>Usuario</th>
                                    	<th>Nombre</th>
                                    	<th>Administrador</th>
                                        <th>Local</th>
                                        <th>Acciones</th>
                                    </thead>
                                    <tbody>
                                        <!-- ko foreach: u.usuarios -->
                                        <tr>
                                        	<td data-bind="text: id"></td>
                                        	<td data-bind="text: usuario"></td>
                                        	<td data-bind="text: nombre"></td> 
                                        	<td data-bind="text: admin"></td>
                                            <td data-bind="text: id_local"></td>
                                            <td>
                                                <button class="btn btn-default" data-bind="click: $parent.u.editar">
                                                    <i class="ti-pencil"></i>
                                                </button>
                                                <button class="btn btn-default" data-bind="click: $parent.u.eliminar">
                                                    <i class="ti-trash"></i>
                                                </button>
                                            </td>
                                        </tr>
                                        <!-- /ko -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </script>

            <script id="pg-editar-usuario" type="text/html">
                <div class="row" data-bind="visible: ((!u.usuarios().length))">
                    <div class="col-md-9">
                        <h3>El usuario solicitado no existe.</h3>
                    </div>
                </div>
                <div class="row" data-bind="visible: (u.usuarios().length), foreach: u.usuarios">
                    <div class="col-md-9">
                        <div class="card">
                            <div class="header">
                                <h4 class="title">Editar usuario</h4>
                            </div>
                            <div class="content">
                                <form>
                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="form-group">
                                                <label>Id</label>
                                                <input type="number" class="form-control border-input" disabled placeholder="Id" data-bind="value: id">
                                            </div>
                                        </div>
                                        <div class="col-md-8">
                                            <div class="form-group">
                                                <label>Nombre</label>
                                                <input type="text" class="form-control border-input" placeholder="Nombre" data-bind="value: nombre">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="form-group">
                                                <label>Nombre de usuario</label>
                                                <input type="text" class="form-control border-input" placeholder="Nombre de usuario" data-bind="value: usuario">
                                            </div>
                                        </div>
                                        <div class="col-md-5">
                                            <div class="form-group">
                                                <label>Local</label>
                                                <input type="text" class="form-control border-input" placeholder="Local" data-bind="value: id_local">
                                            </div>
                                        </div>
                                        <div class="col-md-3">
                                            <div class="form-group">
                                                <label>Administrador
                                                <input type="checkbox" class="form-control border-input" placeholder="Administrador" data-bind="checked: admin"></label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="text-center">
                                        <button type="submit" class="btn btn-info btn-fill btn-wd">Guardar cambios</button>
                                    </div>
                                    <div class="clearfix"></div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </script>

            <script id="pg-nuevo-usuario" type="text/html">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="header">
                                <h4 class="title">Agregar usuario</h4>
                            </div>
                            <div class="content">
                                <form>
                                    <div class="row">
                                        <div class="col-md-7">
                                            <div class="form-group">
                                                <label>Nombre</label>
                                                <input type="text" class="form-control border-input" placeholder="Nombre" data-bind="value: u.nombre">
                                            </div>
                                        </div>
                                        <div class="col-md-5">
                                            <div class="form-group">
                                                <label>Nombre de usuario</label>
                                                <input type="text" class="form-control border-input" placeholder="Nombre de usuario" data-bind="value: u.usuario">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-9">
                                            <div class="form-group">
                                                <label>Local</label>
                                                <input type="text" class="form-control border-input" placeholder="Local" data-bind="value: u.id_local">
                                            </div>
                                        </div>
                                        <div class="col-md-3">
                                            <div class="form-group">
                                                <label>Administrador
                                                <input type="checkbox" class="form-control border-input" placeholder="Administrador" data-bind="checked: u.admin"></label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="text-center">
                                        <button type="submit" class="btn btn-info btn-fill btn-wd">Agregar</button>
                                    </div>
                                    <div class="clearfix"></div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </script>
            
              <script id="fail-template" type="text/html">
